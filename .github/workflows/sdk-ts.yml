name: SDK TypeScript
on:
  push:
    paths: ['sdk/typescript/**']
  pull_request:
    paths: ['sdk/typescript/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd sdk/typescript && npm ci && npm test
