name: Test

# Runs workspace-wide Rust unit tests on every push + PR. Does NOT run
# `anchor test` because:
#   1. `anchor build` hits the Anchor 0.30.1 + proc-macro2 1.0.82+
#      IDL-generation bug — broken on current toolchains
#   2. `anchor test` requires localnet + long-running validator; expensive in CI
#
# This workflow catches:
#   - Compilation regressions across the whole workspace
#   - Unit test regressions in alea-verifier, alea-sdk, example-lottery
#   - is_round_recent boundary tests, PDA derivation determinism, etc.
#
# Does NOT catch:
#   - On-chain integration regressions (run `cargo test -- --ignored` locally
#     with a live devnet Config PDA)
#   - IDL drift (idl-diff.yml handles that separately)

on: [push, pull_request]

# Phase 4.5 T2 — least-privilege workflow permissions. Read-only by default;
# no job in this workflow needs to write anything.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        # Workspace doesn't pin a specific rustc (rust-toolchain.toml absent).
        # Anchor 0.30.1 + deps resolve cleanly on stable rustc.
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build workspace (cargo check, all crates)
        run: cargo check --workspace --all-targets

      - name: Run unit tests (non-ignored only)
        # `--lib --tests` runs lib-unit + integration tests in tests/ dirs.
        # Tests marked `#[ignore]` (devnet_verify, devnet_clock) are skipped.
        run: cargo test --workspace --lib --tests
