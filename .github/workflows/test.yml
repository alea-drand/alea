name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # T2.32 — coral-xyz/anchor-action does NOT exist (verified 2026-04-14
      # via GitHub API: github.com/coral-xyz/anchor-action returns 404).
      # Use manual solana-install + avm pattern instead.

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        # Reads rust-toolchain.toml once it's pinned post Phase 1.1.A.
        # Hardcoded temporarily; swap to rust-toolchain.toml-reading once
        # ADR 0023 / rust-toolchain.toml resolve.
        with:
          toolchain: "1.79.0"  # TBD — Phase 1.1.A output

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v2.2.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor via AVM (pinned =0.30.1)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.30.1
          avm use 0.30.1
          anchor --version | grep "0.30.1" || exit 1

      - run: anchor build
      - run: anchor test
