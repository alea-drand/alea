name: IDL Diff (CPI Stability Enforcement)

# T2.DD — enforces ADR 0028's CPI Interface Stability Guarantee at CI level.
#
# The IDL at `target/idl/alea_verifier.json` is HAND-WRITTEN and committed to
# the repo (see .gitignore — target/* is ignored, !target/idl/alea_verifier.json
# is the exception). This is a Phase 2.5 workaround for the Anchor 0.30.1 +
# proc-macro2 1.0.82+ incompat that breaks `anchor build`'s IDL generation
# (see framework-gotchas).
#
# Because the canonical IDL is the committed file, "did the IDL change" reduces
# to a git diff between the PR head and main on that one file. No anchor build
# is needed (which is good — it would fail anyway on the proc-macro2 bug).
#
# On every PR touching programs/ or the workspace config: diff PR's IDL against
# main's IDL. If they differ AND the PR body does NOT carry the explicit
# `BREAKING-ALLOWED: <ADR>` tag (reserved for new-instruction additive changes
# per ADR 0028 versioning policy), the job fails and the PR is blocked.
#
# Why this is at CI rather than honor-system: ADR 0028 freezes the v1 verify
# instruction signature, Config account layout, Verify Accounts struct, return
# data format, and BeaconVerified event schema for the lifetime of the mainnet
# program ID. A maintainer who edits any of these fields without intending a
# breaking change ships a silent break for every consumer. The IDL diff is
# mechanical: any change in the IDL is detected.
#
# Escape hatch: if a major version bump genuinely DOES intend to ship a new
# instruction (additive-only per ADR 0028; never "existing instruction modified"),
# the PR body must include exactly:
#
#     BREAKING-ALLOWED: ADR-XXXX
#
# where ADR-XXXX is the ADR documenting the new-instruction decision.

on:
  pull_request:
    branches: [main]
    paths:
      - 'programs/**'
      - 'target/idl/alea_verifier.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Anchor.toml'

# Phase 4.5 T2 — least-privilege top-level. Jobs below grant what they need.
permissions:
  contents: read

jobs:
  idl-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to fetch main below

      - name: Fetch main branch
        run: git fetch origin main:main

      - name: Compare committed IDL PR head vs main
        id: diff
        run: |
          PR_IDL="target/idl/alea_verifier.json"
          if [ ! -f "$PR_IDL" ]; then
            echo "❌ Committed IDL file missing at $PR_IDL on PR head."
            echo "The canonical IDL is hand-written and MUST be committed per"
            echo "the Phase 2.5 Anchor 0.30.1 proc-macro2 workaround."
            exit 1
          fi

          # Extract main's version of the file
          git show main:target/idl/alea_verifier.json > /tmp/idl-main.json 2>/dev/null || {
            echo "⚠️ No IDL on main — this is the first PR introducing it. Skipping diff."
            echo "idl_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if diff -q /tmp/idl-main.json "$PR_IDL" > /dev/null; then
            echo "idl_changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ IDL unchanged between main and this PR. CPI stability preserved."
          else
            echo "idl_changed=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ IDL changed between main and this PR."
            echo "--- diff (truncated to first 200 lines) ---"
            diff /tmp/idl-main.json "$PR_IDL" | head -200 || true
          fi

      - name: Check PR body for BREAKING-ALLOWED override
        if: steps.diff.outputs.idl_changed == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Look for: BREAKING-ALLOWED: ADR-NNNN (case-sensitive, exact tag).
          if echo "$PR_BODY" | grep -qE '^BREAKING-ALLOWED: ADR-[0-9]+$'; then
            ALLOWED_ADR=$(echo "$PR_BODY" | grep -oE 'BREAKING-ALLOWED: ADR-[0-9]+' | head -1)
            echo "✅ IDL change explicitly allowed by '$ALLOWED_ADR' tag in PR body."
            echo "Reviewer MUST verify the named ADR exists, is accepted, and authorizes this exact change."
            exit 0
          else
            echo "❌ IDL changed without BREAKING-ALLOWED tag in PR body."
            echo ""
            echo "ADR 0028 (CPI Interface Stability Guarantee) freezes the v1 verify"
            echo "instruction signature, Config account layout, Verify Accounts struct,"
            echo "return data format, and BeaconVerified event schema for the lifetime"
            echo "of the mainnet program ID."
            echo ""
            echo "If this PR adds a NEW instruction (additive — allowed under ADR 0028"
            echo "minor versions): the IDL still changes, so this check fails. To proceed,"
            echo "add to PR body:"
            echo ""
            echo "    BREAKING-ALLOWED: ADR-XXXX"
            echo ""
            echo "where ADR-XXXX documents the new-instruction decision."
            echo ""
            echo "If this PR modifies an EXISTING instruction (forbidden under ADR 0028):"
            echo "do not merge. Open a v2 program ID instead — see ADR 0028 §'Decision'."
            exit 1
          fi
