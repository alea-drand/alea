name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# T1.13 — release MUST be gated on a passing test job. crates.io NEVER removes
# versions that other crates depend on; npm CAN remove but only within 72h. A
# broken release published to either registry is unrecoverable for downstream
# consumers. The `test` job below MUST pass before any publish step runs.
#
# Phase 4.5 rewrite:
# - `anchor test` / `anchor build --verifiable` replaced with
#   `cargo test --workspace` + direct `cargo publish` (Anchor 0.30.1's
#   proc-macro2 IDL bug is bypassed entirely)
# - npm publish --provenance enabled for Sigstore-signed attestation
# - Path+version dual-decl on alea-sdk → alea-verifier dep means cargo
#   strips path on publish automatically; no sed swap needed
# - GitHub release attachments trimmed to CHANGELOG note only (on-chain
#   .so is already committed at target/idl and can be reproduced by
#   consumers via solana-verify build if needed)

# Least-privilege top-level. Specific jobs grant more as needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.79.0"

      - name: Run workspace tests (lib + unit, no anchor build)
        # Phase 4 CI fix: `anchor test` / `anchor build` hit Anchor 0.30.1
        # + proc-macro2 1.0.82+ IDL-generation bug. `cargo test` exercises
        # every crate's unit + lib tests (74+ tests) without the anchor
        # build step. Matches test.yml PR-CI pattern.
        run: cargo test --workspace --lib --tests

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Run TypeScript SDK tests
        working-directory: sdk/typescript
        run: |
          npm ci
          npm test

      # Note: The legacy "Verify fixtures (T2.U)" step referenced
      # build-spec/testing/scripts which is a PRIVATE directory (gitignored
      # from the public repo). The fixtures it used to verify are now
      # covered by sdk/rust/tests/is_round_recent.rs + sdk/typescript/
      # tests/drand.test.ts + the committed target/idl/alea_verifier.json
      # enforced via idl-diff.yml on every PR.

  publish:
    needs: [test]   # gate publish on passing tests
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm provenance attestation signing
    # via Sigstore (T2 hardening — signed attestation ties published
    # tarball back to the exact commit + workflow run).
    permissions:
      contents: write   # to upload release assets
      id-token: write   # for npm provenance Sigstore signing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.79.0"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Build TypeScript SDK (generates IDL inline + compiles)
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          # Phase 4.5: IDL is inlined as src/idl.ts (generated by prebuild)
          # and compiled to dist/idl.js — NOT a separate JSON in dist/idl/.
          # Verify the compiled inline IDL landed:
          test -f dist/idl.js && test -f dist/idl.d.ts || { echo "IDL TS bundle missing"; exit 1; }

      - name: Publish alea-verifier to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # `cpi` feature implies `no-entrypoint`, giving library-mode
        # publish (no BPF entrypoint in the tarball). Path deps on the
        # workspace are stripped automatically by cargo publish.
        run: cargo publish -p alea-verifier --no-default-features --features no-entrypoint

      - name: Wait for crates.io index propagation
        # crates.io index CDN takes up to ~60s for a fresh publish to
        # become resolvable by name + version. Without the wait, the
        # next publish step errors with "no matching package".
        run: sleep 60

      - name: Publish alea-sdk to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # alea-sdk's Cargo.toml has `path + version = "=0.1.0"` on the
        # alea-verifier dep. Cargo strips `path` on publish, uses the
        # version for the tarball — no manual swap dance needed.
        run: cargo publish -p alea-sdk

      - name: Publish @alea-drand/sdk to npm (with provenance)
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --provenance produces a signed Sigstore attestation linking
        # the tarball to this exact commit + workflow run. Consumers
        # can verify via `npm audit signatures`. Post-v0.1.0 migration
        # path: configure Trusted Publishing on npm package settings,
        # remove NPM_TOKEN, rely on OIDC via `id-token: write`.
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # T2.CC — no auto-generated notes; CHANGELOG.md is canonical.
          body_path: CHANGELOG.md
          # Binary attachments deferred — consumers reproduce the deployed
          # on-chain program via `solana-verify build` against the tagged
          # commit. See sdk/rust/README.md §Troubleshooting for the path
          # if needed.
