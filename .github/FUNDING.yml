# Alea funding — OSS public good support channels.
# These surface as a "Sponsor" button at the top of the GitHub repo page.
# Populate the handles you want to expose; remove or comment out the rest.
# Docs: https://docs.github.com/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository

# github: []              # GitHub Sponsors handle (e.g., [aaronisafk])
# custom: []              # any custom URLs (e.g., ["https://alea.so/sponsor"])
# open_collective:        # open_collective handle
# ko_fi:                  # ko-fi handle
# patreon:                # patreon handle
# issuehunt:              # issuehunt handle

# Alea is currently solo-maintained and grant-unfunded. If you'd like to
# sponsor ongoing maintenance or priority integration support, open a
# GitHub issue to coordinate — we'll configure the appropriate channel
# and pin the handle here.
