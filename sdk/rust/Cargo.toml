[package]
name = "alea-sdk"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "CPI crate for Alea — drand BN254 BLS randomness verifier on Solana"
repository = "https://github.com/alea-drand/alea"
homepage = "https://alea.so"
documentation = "https://docs.rs/alea-sdk"
readme = "README.md"
keywords = ["solana", "drand", "randomness", "bls", "bn254"]
categories = ["cryptography", "no-std"]

[lib]
name = "alea_sdk"

[features]
default = []
cpi = ["alea-verifier/cpi"]

[dependencies]
anchor-lang = { workspace = true }
alea-verifier = { path = "../../programs/alea-verifier", features = ["cpi"] }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = ["x86_64-unknown-linux-gnu"]
