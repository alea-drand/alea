[toolchain]
# Pinned rustc version that produced the Phase 2 audit-clean BPF binary.
# Binary reproducibility is load-bearing for Phase 5 external audit
# attestation + ADR 0009 immutable upgrade authority. Do NOT change
# without an ADR amendment + full test + fuzz re-run.
#
# Audit baseline: Phase 2.5 Stage 5b fuzz campaign (1.77B iter, 0 crashes)
# compiled with this exact channel (recorded in
# `build-spec/audit-r5/baseline-versions.txt` and
# `programs/alea-verifier/fuzz/environment.txt`).
#
# Resolution of prior T1.06 (P04 Opus): was `channel = "stable"` — placeholder
# was a Phase 1.1.A completion item that leaked into Phase 2.
channel = "1.94.1"
components = ["rustfmt", "clippy"]
# targets = ["sbf-solana-solana"]  # Provided by Solana CLI (cargo-build-sbf), not rustup
profile = "minimal"
