[toolchain]
# Pinned rustc version used to produce the published binaries. Binary
# reproducibility matters for any future external audit attestation + for
# consumers who want to verify the deployed on-chain binary against a
# locally-compiled version. Do NOT change this channel without a full
# test + fuzz re-run — any change would invalidate the currently-published
# binary SHA256 (see the main README §Program Addresses).
channel = "1.94.1"
components = ["rustfmt", "clippy"]
# targets = ["sbf-solana-solana"]  # Provided by Solana CLI (cargo-build-sbf), not rustup
profile = "minimal"
