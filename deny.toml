# cargo-deny config for Alea
#
# Phase 4.5 T2 supply-chain hardening. Run in CI via
# .github/workflows/supply-chain.yml on every PR + weekly cron.
#
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Match the Solana BPF target + native dev target. Keeping this narrow
# avoids false positives from deps that only exist for other platforms.
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-apple-darwin" },
  { triple = "bpfel-unknown-unknown" },
]
all-features = false
no-default-features = false
# Phase 4.5: exclude dev-dependencies from advisory/license checks. The
# Solana 1.18.x dev-deps (solana-client, solana-sdk, solana-transaction-
# status) pull in a large tree of older transitives (ed25519-dalek,
# curve25519-dalek, ring < 0.17, quinn, etc.) that trigger advisory
# warnings we cannot fix without breaking the locked Solana toolchain.
# These deps exist only for `tests/devnet_*.rs` (gated #[ignore]) and
# never ship to consumers via the published crate. Published library
# surface (alea-verifier + alea-sdk non-dev deps) is the meaningful
# audit boundary.
exclude-dev = true

[output]
feature-depth = 1

# ============================================================================
# Advisories (RUSTSEC advisory DB)
# ============================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Default: fail CI on any active advisory
yanked = "deny"
ignore = [
  # Phase 4.5 baseline — all ignored items are transitives inherited from
  # Anchor 0.30.1 + Solana 1.18.x which we can't upgrade without breaking
  # the locked toolchain. Each line includes review date; re-review at
  # the Phase 5 external audit cutoff. Escalate if new items appear from
  # non-inherited deps — those would be real findings.
  { id = "RUSTSEC-2024-0344", reason = "curve25519-dalek timing variance — pulled via ed25519 in Anchor/Solana deps; no direct use in Alea BN254 code. Reviewed 2026-04-19; re-review Phase 5." },
  { id = "RUSTSEC-2024-0388", reason = "derivative unmaintained; pulled transitively via Anchor macros. No drop-in alternative until Anchor upstream moves. Reviewed 2026-04-19." },
  { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; pulled transitively via Solana's msg! macro infrastructure. Reviewed 2026-04-19." },
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained; pulled transitively via Solana 1.18.x. Ecosystem migration to bincode 2.x is pending upstream. Reviewed 2026-04-19." },
  { id = "RUSTSEC-2025-0161", reason = "libsecp256k1 unmaintained; pulled transitively via Anchor. Alea does not use secp256k1 directly (we use BN254 alt_bn128 syscall). Reviewed 2026-04-19." },
]

# ============================================================================
# Licenses (SPDX)
# ============================================================================
[licenses]
# Apache 2.0 core license for Alea; allowlist OSI-approved permissive
# licenses compatible with redistribution.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "0BSD",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",           # used by webpki / some arkworks deps; file-level copyleft, acceptable
]
# Explicitly deny copyleft licenses incompatible with Apache-2.0 redistribution
confidence-threshold = 0.8
exceptions = []

# Hard-block deps that slipped past the allow-list if any
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 }
]

# ============================================================================
# Banned / unmaintained crates
# ============================================================================
[bans]
multiple-versions = "warn"
wildcards = "warn"   # `*` version deps are a CI-hygiene smell
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

# ============================================================================
# Source registries
# ============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
